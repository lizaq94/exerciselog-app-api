services:
  db:
    image: postgres:17
    container_name: exerciselog-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: exerciselog
      POSTGRES_PASSWORD: exerciselog
      POSTGRES_DB: exerciselog
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U exerciselog -d exerciselog']
      interval: 5s
      timeout: 3s
      retries: 10
  migrate:
    build: .
    image: exerciselog-api:local
    command: npx prisma migrate deploy
    environment:
      DATABASE_URL: 'postgresql://exerciselog:exerciselog@db:5432/exerciselog?schema=public'
    depends_on:
      db:
        condition: service_healthy
  app:
    build: .
    image: exerciselog-api:local
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      DATABASE_URL: 'postgresql://exerciselog:exerciselog@db:5432/exerciselog?schema=public'
      JWT_ACCESS_TOKEN_SECRET: accessTokenSecret
      JWT_REFRESH_TOKEN_SECRET: refreshTokenSecret
      MAIL_HOST: smtp.example.com
      SMTP_USERNAME: test-smtp-user
      SMTP_PASSWORD: test-smtp-password
      S3_ENDPOINT: https://example.com
      S3_ACCESS_KEY_ID: test-access-key
      S3_SECRET_ACCESS_KEY: test-secret-key
      S3_BUCKET_NAME: test-bucket
      S3_PUBLIC_URL: https://test-cdn.example.com
      OPEN_ROUTER_API_KEY: dummy
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

