name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint:ci
      - run: npx prisma generate
      - run: npm run build
      - run: npm run test:cov
  e2e:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/postgres
      JWT_ACCESS_TOKEN_SECRET: ${{ secrets.JWT_ACCESS_TOKEN_SECRET }}
      JWT_REFRESH_TOKEN_SECRET: ${{ secrets.JWT_REFRESH_TOKEN_SECRET }}
      MAIL_HOST: smtp.example.com
      SMTP_USERNAME: test-smtp-user
      SMTP_PASSWORD: test-smtp-password
      S3_ENDPOINT: https://example.com
      S3_ACCESS_KEY_ID: test-access-key
      S3_SECRET_ACCESS_KEY: test-secret-key
      S3_BUCKET_NAME: test-bucket
      S3_PUBLIC_URL: https://test-cdn.example.com
      OPEN_ROUTER_API_KEY: dummy
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npm run test:e2e
  docker:
    needs: [build-and-test, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/lizaq94/exerciselog-app-api
          tags: |
            type=sha,prefix=main-,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
  deploy:
    needs: [docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 10

    steps:
      - name: Tag version
        run: echo "IMAGE_TAG=main-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy to staging
        run: |
          ssh -o ConnectTimeout=15 \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "IMAGE_TAG=$IMAGE_TAG bash -s" <<'EOF'
            set -euo pipefail
            cd /home/deploy/exerciselog-app-api

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d

            for i in $(seq 1 10); do
              if curl -fsS https://staging.exerciselog.app/health > /dev/null; then
                echo "App is live"; exit 0
              fi
              echo "Attempt $i failed, waiting..."
              sleep 5
            done
            echo "Deploy failed - /health did not respond"; exit 1
          EOF