name: exerciselog-app-api-prod
networks:
  web:
    external: true
services:
  migrate:
    image: ghcr.io/lizaq94/exerciselog-app-api:${IMAGE_TAG}
    command: npx prisma migrate deploy
    env_file: .env.prod
    networks: [web]
  app-prod:
    image: ghcr.io/lizaq94/exerciselog-app-api:${IMAGE_TAG}
    restart: unless-stopped
    env_file: .env.prod
    networks: [web]
    depends_on:
      migrate:
        condition: service_completed_successfully
