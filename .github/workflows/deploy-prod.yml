name: Deploy Production

on:
  push:
    tags:
      - v*

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/lizaq94/exerciselog-app-api
          tags: |
            type=semver,pattern={{version}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
  deploy:
    needs: [docker]
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10

    steps:
      - name: Resolve image tag
        run: echo "IMAGE_TAG=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Load ssh key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: |
            mkdir -p ~/.ssh && chmod 700 ~/.ssh
            echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
            chmod 600 ~/.ssh/known_hosts
      - name: Deploy to production
        run: |
            ssh -o ConnectTimeout=15 \
                ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
                "IMAGE_TAG=$IMAGE_TAG bash -s" <<'EOF'
              set -euo pipefail
              cd /home/deploy/exerciselog-prod
              git pull --ff-only
              cp deploy/prod/docker-compose.yml docker-compose.prod.yml
            
              docker compose -f docker-compose.prod.yml pull
              docker compose -f docker-compose.prod.yml up -d
            
              for i in $(seq 1 10); do
                if curl -fsS https://api.exerciselog.app/health > /dev/null; then
                  echo "App is live"; exit 0
                fi
                echo "Attempt $i failed, waiting..."
                sleep 5
              done
              echo "Deploy failed - /health did not respond"; exit 1
            EOF